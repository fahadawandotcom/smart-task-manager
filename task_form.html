{% extends "base.html" %}
{% block title %}{{ action }} Task - Smart Task Manager{% endblock %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h4 class="mb-4"><i class="fa-solid fa-pen-to-square"></i> {{ action }} Task</h4>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Title</label>
          <input type="text" name="title" class="form-control" value="{{ task.title if task else '' }}" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Description</label>
          <textarea name="description" class="form-control" rows="3">{{ task.description if task else '' }}</textarea>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Priority</label>
            <select name="priority" class="form-select">
              {% set p = task.priority if task else 'Medium' %}
              <option value="High" {% if p == "High" %}selected{% endif %}>High</option>
              <option value="Medium" {% if p == "Medium" %}selected{% endif %}>Medium</option>
              <option value="Low" {% if p == "Low" %}selected{% endif %}>Low</option>
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Due Date</label>
            <input type="date" name="due_date" class="form-control" value="{{ task.due_date if task else '' }}">
          </div>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary"><i class="fa-solid fa-floppy-disk"></i> Save</button>
          <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
