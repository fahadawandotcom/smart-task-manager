{% extends "base.html" %}
{% block title %}Login - Smart Task Manager{% endblock %}
{% block content %}
<div class="auth-wrapper">
  <div class="card auth-card p-4">
    <div class="card-body">
      <h3 class="text-center mb-1"><i class="fa-solid fa-list-check text-primary"></i></h3>
      <h3 class="text-center mb-4">Login</h3>
      <form method="POST">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
      </form>
      <p class="text-center mt-3 mb-0">Don't have an account? <a href="{{ url_for('register') }}">Register</a></p>
    </div>
  </div>
</div>
{% endblock %}
